<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Mua Sắm</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome cho Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Header & Navigation -->
    <header class="main-header">
        <div class="logo">
            <h1 id="site-title">My Shop</h1>
        </div>
        <nav class="tab-nav">
            <button class="tab-btn active" data-target="video-feed">
                <i class="fa-solid fa-play"></i> Video Feed
            </button>
            <button class="tab-btn" data-target="product-gallery">
                <i class="fa-solid fa-store"></i> Tất Cả Sản Phẩm
            </button>
        </nav>
    </header>

    <!-- Nội dung chính -->
    <main class="container">
        
        <!-- TAB 1: VIDEO FEED -->
        <section id="video-feed" class="tab-content active">
            <div id="video-container" class="feed-layout">
                <!-- Nội dung video sẽ được render bằng JS vào đây -->
            </div>
        </section>

        <!-- TAB 2: PRODUCT GALLERY -->
        <section id="product-gallery" class="tab-content">
            
            <div class="filter-bar">
                <span class="filter-label">Lọc theo:</span>
                <button class="filter-btn active" data-filter="all">Tất cả</button>
                <button class="filter-btn" data-filter="shopee">Shopee</button>
                <button class="filter-btn" data-filter="tiktok">TikTok</button>
            </div>

            <div id="gallery-container" class="grid-layout">
                <!-- Nội dung sản phẩm sẽ được render bằng JS vào đây -->
            </div>
        </section>

    </main>

    <!-- Nạp App Logic (Tự động kéo dữ liệu từ Google Sheets) -->
    <script src="js/app.js"></script>
    
    <!-- Script hỗ trợ nhúng Video TikTok -->
    <script async src="https://www.tiktok.com/embed.js"></script>
</body>
</html>
